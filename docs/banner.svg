  <text x="324" y="210" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif" font-size="30" font-weight="500" fill="#94a3b8">Turn your real banking data into AI-ready financial context.</text>
</svg>
